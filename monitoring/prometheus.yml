global:
  scrape_interval: 15s        # 15초마다 메트릭 수집
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot 앱의 actuator/prometheus 엔드포인트를 스크레이프
  - job_name: 'recycle-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']   # 같은 docker 네트워크의 app 컨테이너

  # Prometheus 자기 자신
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
