# 모든 컨테이너 공통 로그 제한 (디스크 로그 폭증 방지: 컨테이너당 최대 30MB)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ──────────────────────────────────
  # MySQL 8
  # ──────────────────────────────────
  db:
    image: mysql:8.0
    container_name: recycle-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  # ──────────────────────────────────
  # Redis
  # ──────────────────────────────────
  redis:
    image: redis:7
    container_name: recycle-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  # ──────────────────────────────────
  # Spring Boot App (Docker Hub 이미지 사용)
  # ──────────────────────────────────
  app:
    image: jaewon0009/recycle-app:latest
    container_name: recycle-app
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_SHOW_SQL: "false"      # 운영 SQL 로그 끔(디스크 폭증 방지). 측정 시에만 true
      JWT_SECRET: ${JWT_SECRET}


  # ──────────────────────────────────
  # React Frontend (Docker Hub 이미지 사용)
  # ──────────────────────────────────
  frontend:
    image: jaewon0009/recycle-frontend:latest
    container_name: recycle-frontend
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - app
    ports:
      - "80:80"

  # ──────────────────────────────────
  # Prometheus (메트릭 수집)
  # ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: recycle-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=3d'   # 3일치만 보관 (디스크/메모리 절약)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    logging: *default-logging
    mem_limit: 256m            # 2GB 인스턴스 보호용 메모리 상한
    depends_on:
      - app

  # ──────────────────────────────────
  # Grafana (대시보드 시각화)
  # ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: recycle-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    logging: *default-logging
    mem_limit: 256m
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:
