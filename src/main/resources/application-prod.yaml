spring:
  sql:
    init:
      mode: never         # 재시작 시 seed 재로드/TRUNCATE 방지 (운영). 측정 시에만 임시로 always 사용
      encoding: UTF-8      # classpath seed 를 UTF-8 로 읽음 (한글 깨짐/Data too long 방지)
      data-locations: classpath:seed_data.sql
  jpa:
    hibernate:
      ddl-auto: update   # 최초 배포 후 validate로 변경 권장
    properties:
      hibernate:
        format_sql: false  # 운영(측정 시에만 true)
        # [N+1 After] 측정의 After 단계에서 아래 주석 해제 후 재배포
        # default_batch_fetch_size: 100

# 운영 로깅 (측정 시에만 org.hibernate.SQL: debug / bind: trace 로 임시 변경)
logging:
  level:
    root: warn
    com.example.RecycleProject: info
    org.hibernate.SQL: warn                  # 운영(측정 시 debug)
    org.hibernate.orm.jdbc.bind: warn        # 운영(측정 시 trace)
