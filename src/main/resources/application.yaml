jwt:
  secret: "a826ffd6fd03cb43af649c33484461a4bf392ff9861bf66f0d8fe243f864884a"
  access-exp-min: 30
  refresh-exp-days: 14

spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:mysql://localhost:3306/recycle_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      data-locations: classpath:seed_data.sql

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update   # 처음 테스트용: update / 운영: validate
    defer-datasource-initialization: true  # JPA 테이블 생성 후 SQL 실행
    properties:
      hibernate:
        format_sql: true
        # [N+1 After] 아래 한 줄 주석 해제 후 앱 재시작 → User 조회가 IN절 1쿼리로 합쳐짐
        #   Before(주석 상태): board 1쿼리 + user N쿼리   (N+1)
        #   After (해제 상태): board 1쿼리 + user IN쿼리 1개  (총 2쿼리)
        # default_batch_fetch_size: 100
    open-in-view: false

logging:
  level:
    root: info
    com.example.RecycleProject: debug
    org.hibernate.SQL: debug                # 실행 SQL 출력
    org.hibernate.orm.jdbc.bind: trace      # 바인딩 파라미터 출력 (Hibernate 6)

# ───────────────── 모니터링 (Prometheus + Grafana) ─────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus   # Prometheus가 긁어갈 /actuator/prometheus 노출
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: recycle-app              # 모든 메트릭에 공통 태그(여러 앱 구분용)
    distribution:
      percentiles-histogram:
        http.server.requests: true          # HTTP 응답시간 p95/p99 히스토그램 버킷 생성

